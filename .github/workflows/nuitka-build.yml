name: 跨平台构建版本
run-name: 构建版本 ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v*' 
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONIOENCODING: utf8

jobs:
  build:
    name: 在 ${{ matrix.os }} 上构建版本
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 安装系统依赖（仅Linux）
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf ccache libxcb-cursor0

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 准备构建脚本
        shell: bash
        run: |
          echo "${{ secrets.BUILD_SCRIPT_BASE64 }}" | base64 --decode > build.py

      - name: 构建可执行文件
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="dev"
          fi
          
          python build.py --set-version $VERSION --build

      - name: 上传构建文件
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.bin

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: 下载所有构建文件
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: 创建发行版
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.bin
          generate_release_notes: true